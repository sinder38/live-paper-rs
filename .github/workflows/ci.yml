name: CI & Tests

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
  push:
    paths-ignore:
      - "**.md"
    branches:
      - main
      - ci-*
      - ci/*
    tags:
      - "v*"

permissions:
  contents: read


jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy --workspace --features nested-type,nested-name -- -D warnings

  rustfmt:
    name: Rust-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: Test ${{ matrix.features }} (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --verbose ${{ matrix.flags }}
      - name: Run tests
        run: cargo test --workspace --verbose ${{ matrix.flags }}
